<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>FinTrack | Login</title>

    <!-- Auth CSS -->

    <link rel="stylesheet"
          href="/css/auth.css">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- =====================
         MAIN CONTAINER
    ====================== -->

    <div class="auth-container">

        <!-- =====================
             LEFT PANEL
        ====================== -->

        <div class="auth-left">

            <div class="brand">

                <h1>💰 FinTrack</h1>

                <p>

                    Track expenses, manage budgets,
                    monitor savings goals and
                    generate financial reports
                    in one place.

                </p>

            </div>

        </div>

        <!-- =====================
             RIGHT PANEL
        ====================== -->

        <div class="auth-right">

            <div class="auth-card">

                <h2>Welcome Back</h2>

                <p>
                    Login to continue
                </p>

                <!-- Alert Box -->

                <div
                id="alertBox"
                class="alert">

                </div>

                <!-- Login Form -->

                <form id="loginForm">

                    <!-- Email -->

                    <div class="input-group">

                        <label>
                            Email Address
                        </label>

                        <input
                        type="email"
                        id="loginEmail"
                        placeholder="Enter Email"
                        required>

                    </div>

                    <!-- Password -->

                    <div class="input-group">

                        <label>
                            Password
                        </label>

                        <div class="password-box">

                            <input
                            type="password"
                            id="loginPassword"
                            placeholder="Enter Password"
                            required>

                            <i
                            id="togglePassword"
                            class="fa-solid fa-eye">
                            </i>

                        </div>

                    </div>

                    <!-- Remember Me -->

                    <div class="options">

                        <label>

                            <input
                            type="checkbox"
                            id="rememberMe">

                            Remember Me

                        </label>

                        <a href="#">
                            Forgot Password?
                        </a>

                    </div>

                    <!-- Submit -->

                    <button
                    type="submit"
                    class="auth-btn">

                        Login

                    </button>

                </form>

                <!-- Divider -->

                <div class="divider">

                    <span>
                        OR
                    </span>

                </div>

                <!-- Google Button -->

                <button
                type="button"
                class="google-btn">

                    <i class="fab fa-google"></i>

                    Continue with Google

                </button>

                <!-- Register Link -->

                <div class="bottom-text">

                    Don't have an account?

                    <a href="register.html">

                        Create Account

                    </a>

                </div>

            </div>

        </div>

    </div>

    <!-- =====================
         AUTH JS
    ====================== -->

    <script src="/javascript/auth.js"></script>

</body>

</html>
